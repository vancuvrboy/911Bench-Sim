name: Governance CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Compile Check
        run: |
          python -m py_compile $(find gov_server tests scripts -name "*.py")

      - name: Unit and Integration Tests
        run: |
          python -m unittest tests.test_state_store tests.test_southbound_security tests.test_southbound_resilience tests.test_mcp_server tests.test_python_sdk

      - name: Harness Runner
        run: |
          python -m tests.harness.runner --root . --cases-dir tests/cases --output-dir tests/results

      - name: Quality Gate
        run: |
          python -m tests.harness.quality_gate --report tests/results/governance_harness_report.json --max-p95-ms 200

      - name: Conformance Matrix
        run: |
          python -m tests.harness.conformance_matrix --root . --output-dir tests/results

      - name: WP1 Validation
        run: |
          python -m tests.harness.wp1_validation --root . --output-dir tests/results

      - name: Generate SBOM
        run: |
          python scripts/generate_sbom.py --root . --output tests/results/sbom_manifest.json

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: governance-results
          path: tests/results
