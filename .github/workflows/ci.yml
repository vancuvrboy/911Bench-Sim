name: SIM CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Compile Check
        run: |
          python -m py_compile $(find agents sim_server harness tests -name "*.py")

      - name: SIM Phase 1 Validation
        run: |
          python -m tests.harness.phase1_validation --root . --output-dir tests/reports

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sim-results
          path: tests/reports
